<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: url("/static/bg.jpg") no-repeat center center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: rgba(0,0,0,0.2);
            padding: 30px;
            border-radius: 10px;
            color: white;
            text-align: center;
        }

        input {
            display: block;
            margin: 10px auto;
            padding: 10px;
            width: 200px;
        }

        button {
            padding: 10px 20px;
            background: green;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Login</h2>

    <form action="/" method="post">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
