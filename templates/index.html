<!DOCTYPE html>
<html>
<head>
    <title>Prediction</title>

    <style>
        body {
            font-family: Arial;
            background: url("/static/bg.jpg");
            background-size: cover;
        }

        .container {
            width: 80%;
            margin: auto;
            margin-top: 50px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            color: white;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 10px;
        }

        input {
            padding: 10px;
        }

        button {
            margin-top: 10px;
            padding: 10px;
            background: green;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Heart Prediction</h1>

    <form action="/predict" method="post">
        <div class="form-grid">
            <input name="age" placeholder="Age">
            <input name="sex" placeholder="Sex">
            <input name="cp" placeholder="CP">
            <input name="trestbps" placeholder="BP">
            <input name="chol" placeholder="Chol">
            <input name="fbs" placeholder="FBS">
            <input name="restecg" placeholder="ECG">
            <input name="thalach" placeholder="HR">
            <input name="exang" placeholder="Exang">
            <input name="oldpeak" placeholder="Oldpeak">
            <input name="slope" placeholder="Slope">
            <input name="ca" placeholder="CA">
            <input name="thal" placeholder="Thal">
        </div>

        <button type="submit">Predict</button>
    </form>

    <!-- ✅ RESULT -->
    {% if result %}
        <h2>{{ result }}</h2>
    {% endif %}

    <!-- ✅ DETAILED FEEDBACK -->
    {% if details %}
        <h3>🩺 Health Feedback</h3>
        <ul>
            {% for f in details %}
                <li>{{ f }}</li>
            {% endfor %}
        </ul>
    {% endif %}

    <a href="{{ url_for('home') }}">
        <button type="button">⬅ Back</button>
    </a>

</div>

</body>
</html>
