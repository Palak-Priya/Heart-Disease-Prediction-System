<!DOCTYPE html>
<html>
<head>
    <title>Details</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f2027;
            color: white;
        }

        .container {
            width: 70%;
            margin: 50px auto;
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 10px;
        }

        h1 {
            margin-top: 20px;
            color: #00c6ff;
        }

        h2 {
            margin-top: 20px;
            color: #ffd700;
        }

        p {
            line-height: 1.6;
        }

        .btn {
            margin-top: 25px;
            padding: 10px 20px;
            background: #00c6ff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn:hover {
            background: #0096c7;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- IMAGE -->
    <img src="/static/{{ info.img }}">

    <!-- TITLE -->
    <h1>{{ info.title }}</h1>

    <!-- DESCRIPTION -->
    <h2>About</h2>
    <p>{{ info.desc }}</p>

    <!-- CAUSE -->
    <h2>How it Occurs</h2>
    <p>{{ info.cause }}</p>

    <!-- PREVENTION -->
    <h2>Prevention</h2>
    <p>{{ info.prevention }}</p>

    <a href="{{ url_for('types') }}">
        <button class="btn">⬅ Back</button>
    </a>

</div>

</body>
</html>
